name: Storybook Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: "storybook-preview-${{ github.event.pull_request.number }}"

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Remove preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages 2>/dev/null || exit 0

          WORK_DIR=$(mktemp -d)
          git worktree add "$WORK_DIR" gh-pages

          if [ -d "$WORK_DIR/pr/$PR_NUMBER" ]; then
            rm -rf "$WORK_DIR/pr/$PR_NUMBER"
            cd "$WORK_DIR"
            git add -A
            git commit -m "Clean up Storybook preview for PR #$PR_NUMBER"
            git push origin gh-pages
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove "$WORK_DIR" --force
