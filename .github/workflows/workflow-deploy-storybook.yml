name: Deploy Storybook to GitHub Pages

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: "gh-pages-main"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.node-version'
      - name: Setup PNPM
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2.4.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build-storybook
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initial gh-pages branch"
            git push origin gh-pages
            git checkout -
            git fetch origin gh-pages:gh-pages
          fi

          # Set up a temporary directory for the deployment
          WORK_DIR=$(mktemp -d)
          git worktree add "$WORK_DIR" gh-pages

          # Remove everything except the pr/ directory (preserves PR previews)
          find "$WORK_DIR" -maxdepth 1 \
            ! -name '.git' \
            ! -name 'pr' \
            ! -path "$WORK_DIR" \
            -exec rm -rf {} +

          # Copy new build to root
          cp -r storybook-static/* "$WORK_DIR/"

          # Commit and push
          cd "$WORK_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy Storybook from main ($(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD))"
            git push origin gh-pages
          fi

          # Clean up worktree
          cd "$GITHUB_WORKSPACE"
          git worktree remove "$WORK_DIR" --force
